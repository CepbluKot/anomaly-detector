---
# ServiceAccount под которым запускаются Pod-ы anomaly-detector
apiVersion: v1
kind: ServiceAccount
metadata:
  name: anomaly-detector
  namespace: airflow
  labels:
    app: anomaly-detector

---
# Role: минимальные права для запуска Pod через KubernetesPodOperator
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: anomaly-detector-pod-runner
  namespace: airflow
  labels:
    app: anomaly-detector
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]

---
# RoleBinding: даём права Airflow worker-у запускать Pod-ы
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: anomaly-detector-pod-runner
  namespace: airflow
  labels:
    app: anomaly-detector
subjects:
  - kind: ServiceAccount
    name: airflow-worker        # ServiceAccount Airflow worker-а
    namespace: airflow
roleRef:
  kind: Role
  name: anomaly-detector-pod-runner
  apiGroup: rbac.authorization.k8s.io
