# Секреты для ClickHouse — передаются в Pod через Airflow Variables.
# Этот файл — шаблон. Значения заполнить перед применением
# или использовать External Secrets / Vault.
#
# Применять: kubectl apply -f k8s/secret.yaml -n airflow
#
# В Airflow Variables (Admin → Variables) прописать:
#   ANOMALY_CH_HOST      — хост ClickHouse
#   ANOMALY_CH_PORT      — порт (обычно 8123)
#   ANOMALY_CH_USER      — пользователь
#   ANOMALY_CH_PASSWORD  — пароль
#   ANOMALY_CH_DATABASE  — база данных
#   ANOMALY_DETECTOR_IMAGE     — docker image (registry.your-company.com/anomaly-detector:latest)
#   ANOMALY_DETECTOR_NAMESPACE — namespace (airflow)
#   ANOMALY_DETECTOR_DATA_PVC  — имя PVC (anomaly-detector-data)

apiVersion: v1
kind: Secret
metadata:
  name: anomaly-detector-clickhouse
  namespace: airflow
  labels:
    app: anomaly-detector
type: Opaque
stringData:
  ANOMALY_CH_HOST:     "clickhouse.your-company.com"
  ANOMALY_CH_PORT:     "8123"
  ANOMALY_CH_USER:     "anomaly_detector"
  ANOMALY_CH_PASSWORD: "changeme"
  ANOMALY_CH_DATABASE: "ml"
